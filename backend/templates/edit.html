{% extends "base.html" %}
{% block title %}Редактировать тип партнёра{% endblock %}
{% block content %}
<div class="container-center">
  <h1>Редактировать тип партнёра</h1>
  {% if message %}<p class="message">{{ message }}</p>{% endif %}

  <form method="post" action="/edit/{{ partner['id'] }}" style="max-width: 600px; width: 100%;">
    <label for="id">ID:</label>
    <input id="id" name="id" value="{{ partner['id'] }}" readonly>

    <label for="type">Тип (Brief):</label>
    <input id="type" name="type" value="{{ partner.get('Brief', '') or '' }}" required>

    <label for="name">Наименование (Name):</label>
    <input id="name" name="name" value="{{ partner.get('Name', '') or '' }}" required>

    <button type="submit" class="btn-accent">Сохранить</button>
  </form>

  <p class="back-to-list"><a href="/" class="btn btn-outline">← Назад к списку</a></p>
</div>
{% endblock %}
