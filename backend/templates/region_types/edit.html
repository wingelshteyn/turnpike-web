{% extends "base.html" %}
{% block title %}Редактировать тип территории{% endblock %}
{% block content %}
<div class="container-center">
  <h1>Редактировать тип территории</h1>
  {% if message %}<p class="message">{{ message }}</p>{% endif %}

  <form method="post" action="/region-types/edit/{{ region['id'] }}" style="max-width: 600px; width: 100%;">
    <label for="type">Краткое название (Brief):</label>
    <input id="type" name="type" value="{{ region.get('Brief', '') or '' }}" required>

    <label for="name">Полное название (Name):</label>
    <input id="name" name="name" value="{{ region.get('Name', '') or '' }}" required>

    <button type="submit" class="btn-accent">Сохранить</button>
  </form>

  <p class="back-to-list"><a href="/region-types" class="btn btn-outline">← Назад к списку</a></p>
</div>
{% endblock %}
