{% extends "base.html" %}
{% block title %}Редактировать улицу{% endblock %}
{% block content %}
<div class="container-center">
  <h1>Редактировать улицу</h1>
  {% if message %}<p class="message">{{ message }}</p>{% endif %}

  <div class="edit-glass-window">
  <form method="post" action="/streets/edit/{{ street['id'] }}" style="max-width: 600px; width: 100%;">
    <label for="id">ID:</label>
    <input id="id" value="{{ street['id'] }}" readonly>

    <label for="city">Город:</label>
    <select id="city" name="city" required>
      <option value="" disabled>Выберите город</option>
      {% for c in cities %}
      <option value="{{ c['id'] }}" {% if c['id']|string == (street.get('City') or '')|string %}selected{% endif %}>{{ c.get('Name', '—') or '—' }}</option>
      {% endfor %}
    </select>

    <label for="name">Наименование:</label>
    <input id="name" name="name" value="{{ street.get('Name') or street.get('name', '') or '' }}" required>

    <button type="submit" class="btn-accent">Сохранить</button>
  </form>
  </div>

  <p class="back-to-list"><a href="/streets" class="btn btn-outline">← Назад к списку</a></p>
</div>
{% endblock %}
