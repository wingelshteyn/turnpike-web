{% extends "base.html" %}
{% block title %}Редактировать дом{% endblock %}
{% block content %}
<div class="container-center">
  <h1>Редактировать дом</h1>
  {% if message %}<p class="message">{{ message }}</p>{% endif %}

  <div class="edit-glass-window">
  <form method="post" action="/houses/edit/{{ house['id'] }}" style="max-width: 600px; width: 100%;">
    <label for="id">ID:</label>
    <input id="id" value="{{ house['id'] }}" readonly>

    <label for="street">Улица:</label>
    <select id="street" name="street" required>
      <option value="" disabled>Выберите улицу</option>
      {% for s in streets %}
      <option value="{{ s['id'] }}" {% if s['id']|string == (house.get('Street') or house.get('street') or house.get('f_Street') or '')|string %}selected{% endif %}>{{ s.get('name') or s.get('Name', '—') or '—' }}</option>
      {% endfor %}
    </select>

    <label for="number">Номер:</label>
    <input id="number" name="number" value="{{ house.get('Number') or house.get('number', '') or '' }}" required>

    <button type="submit" class="btn-accent">Сохранить</button>
  </form>
  </div>

  <p class="back-to-list"><a href="/houses" class="btn btn-outline">← Назад к списку</a></p>
</div>
{% endblock %}
