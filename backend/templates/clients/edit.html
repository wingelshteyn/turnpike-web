{% extends "base.html" %}
{% block title %}Редактировать клиента{% endblock %}
{% block content %}
<div class="container-center">
  <h1>Редактировать клиента</h1>
  {% if message %}<p class="message">{{ message }}</p>{% endif %}

  <div class="edit-glass-window">
  <form method="post" action="/clients/edit/{{ item['id'] }}" style="max-width: 600px; width: 100%;">
    <label for="id">ID:</label>
    <input id="id" value="{{ item['id'] }}" readonly>

    <label for="name">Имя (Name):</label>
    <input id="name" name="name" value="{{ item.get('Name', '') or '' }}">

    <label for="place">Место (Place):</label>
    <input id="place" name="place" value="{{ item.get('Place', '') or '' }}">

    <label for="house">Дом (House ID):</label>
    <input id="house" name="house" type="number" value="{{ item.get('House', '') or '' }}">

    <label for="apart">Квартира (Apart):</label>
    <input id="apart" name="apart" value="{{ item.get('Apart', '') or '' }}">

    <button type="submit" class="btn-accent">Сохранить</button>
  </form>
  </div>

  <p class="back-to-list"><a href="/clients" class="btn btn-outline">← Назад к списку</a></p>
</div>
{% endblock %}
