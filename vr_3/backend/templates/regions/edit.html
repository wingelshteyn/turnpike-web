{% extends "base.html" %}
{% block title %}Редактировать регион{% endblock %}
{% block content %}
<div class="container-center">
  <h1>Редактировать регион</h1>
  {% if message %}<p class="message">{{ message }}</p>{% endif %}

  <form method="post" action="/regions/edit/{{ region['id'] }}" style="max-width: 600px; width: 100%;">
    <label for="id">ID:</label>
    <input id="id" value="{{ region['id'] }}" readonly>

    <label for="partner">Партнёр:</label>
    <select id="partner" name="partner" required>
      {% for p in partners %}
      <option value="{{ p['id'] }}" {% if p['id']|string == (region.get('Partner') or '')|string %}selected{% endif %}>{{ p.get('Name', '—') or '—' }}</option>
      {% endfor %}
    </select>

    <label for="region_type">Тип территории:</label>
    <select id="region_type" name="region_type" required>
      {% for rt in region_types %}
      <option value="{{ rt['id'] }}" {% if rt['id']|string == (region.get('RegionType') or '')|string %}selected{% endif %}>{{ rt.get('Name', '—') or '—' }}</option>
      {% endfor %}
    </select>

    <label for="name">Наименование:</label>
    <input id="name" name="name" value="{{ region.get('Name', '') or '' }}" required>

    <label for="place">Место:</label>
    <input id="place" name="place" value="{{ region.get('Place', '') or '' }}" required>

    <button type="submit" class="btn-accent">Сохранить</button>
  </form>

  <p class="back-to-list"><a href="/regions" class="btn btn-outline">← Назад к списку</a></p>
</div>
{% endblock %}
