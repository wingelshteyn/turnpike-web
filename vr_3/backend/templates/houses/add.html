{% extends "base.html" %}
{% block title %}Добавить дом{% endblock %}
{% block content %}
<div class="container-center">
  <h1>Добавить дом</h1>

  <form method="post" action="/houses/add" style="max-width: 600px; width: 100%;">
    <label for="street">Улица:</label>
    <select id="street" name="street" required>
      <option value="" disabled selected>Выберите улицу</option>
      {% for s in streets %}
      <option value="{{ s['id'] }}">{{ s.get('name') or s.get('Name', '—') or '—' }}</option>
      {% endfor %}
    </select>

    <label for="number">Номер:</label>
    <input id="number" name="number" required>

    <button type="submit" class="btn-accent">Создать</button>
  </form>

  <p class="back-to-list"><a href="/houses" class="btn btn-outline">← Назад к списку</a></p>
</div>
{% endblock %}
