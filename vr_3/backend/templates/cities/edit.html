{% extends "base.html" %}
{% block title %}Редактировать город{% endblock %}
{% block content %}
<div class="container-center">
  <h1>Редактировать город</h1>
  {% if message %}<p class="message">{{ message }}</p>{% endif %}

  <form method="post" action="/cities/edit/{{ city['id'] }}" style="max-width: 600px; width: 100%;">
    <label for="id">ID:</label>
    <input id="id" value="{{ city['id'] }}" readonly>

    <label for="name">Наименование (Name):</label>
    <input id="name" name="name" value="{{ city.get('Name', '') or '' }}" required>

    <button type="submit" class="btn-accent">Сохранить</button>
  </form>

  <p class="back-to-list"><a href="/cities" class="btn btn-outline">← Назад к списку</a></p>
</div>
{% endblock %}
